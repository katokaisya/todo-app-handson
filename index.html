<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TODOアプリ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <h1 class="app-title">TODO アプリ</h1>
    </header>

    <main class="app-main">
      <section class="task-input-section">
        <form class="task-form">
          <input
            type="text"
            class="task-input"
            placeholder="タスクを入力してください"
            aria-label="タスク入力"
          >
          <button type="submit" class="task-add-button">追加</button>
        </form>
      </section>

      <section class="task-list-section">
        <h2 class="task-list-heading">タスク一覧</h2>
        <ul class="task-list">

          <!-- 未完了タスク -->
          <li class="task-item">
            <label class="task-label">
              <input type="checkbox" class="task-checkbox">
              <span class="task-text">牛乳を買う</span>
            </label>
            <div class="task-actions">
              <button type="button" class="task-edit-button">編集</button>
              <button type="button" class="task-delete-button">削除</button>
            </div>
          </li>

          <!-- 未完了タスク -->
          <li class="task-item">
            <label class="task-label">
              <input type="checkbox" class="task-checkbox">
              <span class="task-text">レポートを提出する</span>
            </label>
            <div class="task-actions">
              <button type="button" class="task-edit-button">編集</button>
              <button type="button" class="task-delete-button">削除</button>
            </div>
          </li>

          <!-- 完了済みタスク -->
          <li class="task-item is-completed">
            <label class="task-label">
              <input type="checkbox" class="task-checkbox" checked>
              <span class="task-text">会議の準備をする</span>
            </label>
            <div class="task-actions">
              <button type="button" class="task-edit-button">編集</button>
              <button type="button" class="task-delete-button">削除</button>
            </div>
          </li>

          <!-- 完了済みタスク -->
          <li class="task-item is-completed">
            <label class="task-label">
              <input type="checkbox" class="task-checkbox" checked>
              <span class="task-text">メールを返信する</span>
            </label>
            <div class="task-actions">
              <button type="button" class="task-edit-button">編集</button>
              <button type="button" class="task-delete-button">削除</button>
            </div>
          </li>

        </ul>
      </section>
    </main>
  </div>
</body>
</html>
