<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TODOアプリ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <h1 class="app-title">TODO アプリ</h1>
    </header>

    <main class="app-main">
      <section class="task-input-section">
        <form class="task-form">
          <input
            type="text"
            class="task-input"
            placeholder="タスクを入力してください"
            aria-label="タスク入力"
          >
          <button type="submit" class="task-add-button">追加</button>
        </form>
      </section>

      <section class="task-list-section">
        <h2 class="task-list-heading">タスク一覧</h2>
        <ul class="task-list">
          <!-- タスクはJSで動的に描画されます -->
        </ul>
      </section>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
